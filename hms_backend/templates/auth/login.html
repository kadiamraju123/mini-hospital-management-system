<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
    font-family: Arial;
    background-color:#f2f2f2;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:8px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
    width:300px;
}

input{
    width:100%;
    padding:8px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
}

a{
    display:block;
    text-align:center;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form method="post">
{% csrf_token %}

<label>Username</label>
<input type="text" name="username">

<label>Password</label>
<input type="password" name="password">

<button type="submit">Login</button>

</form>

<a href="/signup/">Create Account</a>

</div>

</body>
</html>
