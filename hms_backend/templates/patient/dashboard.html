<!DOCTYPE html>
<html>
<head>
<title>Patient Dashboard</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:500px;
}

ul{
    list-style:none;
    padding:0;
}

li{
    margin:10px 0;
}

.book{
    margin-left:10px;
    background:#28a745;
    color:white;
    padding:5px 10px;
    text-decoration:none;
    border-radius:4px;
}

.logout{
    text-align:center;
    margin-top:20px;
}

.logout a{
    background:#dc3545;
    color:white;
    padding:10px 20px;
    text-decoration:none;
    border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>Patient Dashboard</h2>

<h3>Available Appointments</h3>

{% if slots %}

<ul>
{% for slot in slots %}
<li>

Dr. {{slot.doctor.username}} |
{{slot.date}} |
{{slot.start_time}} - {{slot.end_time}}

<a class="book" href="/book/{{slot.id}}/">Book</a>

</li>
{% endfor %}
</ul>

{% else %}

<p>No available appointments.</p>

{% endif %}

<hr>

<div class="logout">
<a href="/logout/">Logout</a>
</div>

</div>

</body>
</html>
